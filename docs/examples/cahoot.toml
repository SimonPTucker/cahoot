# Example Cahoot configuration.
#
# Copy this to ~/.config/cahoot/cahoot.toml and edit. See docs/OPERATIONS.md
# for the lookup order and docs/ADAPTERS.md for per-adapter options.
#
# QUICK FIELD GUIDE
#   id    — your choice; short unique label that appears in the roster.
#   role  — your choice; a STICKY NOTE you put on the agent so you can
#           tell which is which. Lives entirely in Cahoot's world: it is
#           NOT sent into the agent's profile, model, system prompt, or
#           capabilities. Cahoot uses it for the roster display and
#           @<role> mention routing. The agent's actual behaviour is set
#           by its own configuration (Hermes profile / OpenClaw session).
#           Pick anything readable: planner, writer, reviewer, qa, etc.
#   kind  — RESERVED; must match a registered adapter: "synthetic",
#           "hermes", or "openclaw". Adding a new kind is a 1-line registry
#           edit (see docs/ADAPTERS.md).
#
# Anything beyond id / role / kind / version / cwd / permission_policy is
# passed straight through to the adapter constructor as a keyword
# argument — useful for per-adapter knobs like OpenClaw's token_file.

[cahoot]
# Default room name for chat / events. Your choice; "ops" is conventional.
room = "ops"
# DEBUG | INFO | WARNING | ERROR
log_level = "INFO"

# -----------------------------------------------------------------------------
# Optional admission gate. Without this block, mode defaults to "open" and
# every agent Cahoot spawns is admitted as soon as it ACKs the welcome.
# In "strict" mode every [[agents]] below is auto-allowlisted; only IDs
# also listed in allowed_ids (or in [[agents]]) can join.
# -----------------------------------------------------------------------------
# [cahoot.admission]
# mode = "strict"
# allowed_ids = []

# -----------------------------------------------------------------------------
# Optional network listener. Enables /invite and accepts inbound
# `cahoot-join` connections from other machines on the LAN. Without this
# block the listener stays off; the only way to add agents is via
# [[agents]] blocks below.
# -----------------------------------------------------------------------------
# [cahoot.listener]
# enabled = true
# bind = "0.0.0.0"     # 0.0.0.0 = LAN-wide; use 127.0.0.1 to lock to localhost
# port = 9876
# invite_ttl_s = 1800  # token lifetime in seconds (default 30 min)

# -----------------------------------------------------------------------------
# Synthetic agent for testing the dashboard before real adapters land.
# Safe to leave in; useful for verifying the UI keeps rendering even when no
# real agents are configured.
# -----------------------------------------------------------------------------
[[agents]]
id   = "synthetic-1"   # label of your choosing
role = "test"          # label of your choosing
kind = "synthetic"     # RESERVED — must be "synthetic"
chatter_interval_s = 2.0
# Uncomment to exercise the reconnect loop (each read_loop iteration raises):
# drop_probability = 0.2

# -----------------------------------------------------------------------------
# Real agents — uncomment and edit for your fleet.
#
# Both adapters speak ACP (Agent Client Protocol — JSON-RPC over stdio,
# the protocol Hermes and OpenClaw natively expose). Cahoot spawns the
# agent as a subprocess and routes operator DMs to it.
#
# Install the ACP extra first:
#     pip install -e ".[acp]"
# Hermes additionally needs `uv` / `uvx` on PATH.
# OpenClaw needs the `openclaw` CLI installed and `openclaw onboard`
# completed once.
# -----------------------------------------------------------------------------

# Hermes Agent (NousResearch/hermes-agent).
# `role` below is a STICKY NOTE for you — it does not configure Hermes.
# Hermes's actual behaviour is fully set by the version you pin + its
# own config files / OAuth.
# [[agents]]
# id   = "hermes-main"   # sticky-note label; must be unique
# role = "planner"       # sticky-note label; pick anything readable
# kind = "hermes"        # RESERVED — must be "hermes"
# version = "0.14.0"
# cwd = "~/work/project"
# permission_policy = "auto-allow"  # "auto-allow" or "deny"

# OpenClaw, first seat. Two seats below = two parallel jobs against the
# same OpenClaw Gateway. `session` is OpenClaw's own selector format
# (agent:<name>:<profile>) — substitute the session IDs you configured
# inside OpenClaw. That session string is what actually determines what
# this agent does; `role` is just the sticky note Cahoot uses to display
# it. Prefer token_file over inline `token` so the secret stays out of
# the config and process listing.
# [[agents]]
# id   = "openclaw-1"     # sticky-note label
# role = "writer"         # sticky-note label; "formatter", "qa", "researcher" — your call
# kind = "openclaw"       # RESERVED — must be "openclaw"
# token_file = "~/.openclaw/main.token"
# session    = "agent:writer:main"

# OpenClaw, second seat — same `role` sticky note so @writer can DM
# either of them. The two seats differ because they point at different
# OpenClaw sessions (writer:main vs writer:secondary), NOT because of
# the role label.
# [[agents]]
# id   = "openclaw-2"
# role = "writer"
# kind = "openclaw"
# token_file = "~/.openclaw/main.token"
# session    = "agent:writer:secondary"
