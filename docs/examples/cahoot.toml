# Example Cahoot configuration.
#
# Copy this to ~/.config/cahoot/cahoot.toml and edit. See docs/OPERATIONS.md
# for the lookup order and docs/ADAPTERS.md for per-adapter options.

[cahoot]
# Default room name for chat / events.
room = "ops"
# DEBUG | INFO | WARNING | ERROR
log_level = "INFO"

# -----------------------------------------------------------------------------
# Synthetic agent for testing the dashboard before real adapters land.
# Safe to leave in; useful for verifying the UI keeps rendering even when no
# real agents are configured.
# -----------------------------------------------------------------------------
[[agents]]
id = "synthetic-1"
role = "test"
kind = "synthetic"
chatter_interval_s = 2.0
# Uncomment to exercise the reconnect loop (each read_loop iteration raises):
# drop_probability = 0.2

# -----------------------------------------------------------------------------
# Real agents — uncomment and edit for your fleet.
#
# Both adapters speak ACP (Agent Client Protocol — JSON-RPC over stdio,
# the protocol Hermes and OpenClaw natively expose). Cahoot spawns the
# agent as a subprocess and routes operator DMs to it.
#
# Install the ACP extra first:
#     pip install -e ".[acp]"
# Hermes additionally needs `uv` / `uvx` on PATH.
# OpenClaw needs the `openclaw` CLI installed and `openclaw onboard`
# completed once.
# -----------------------------------------------------------------------------

# Hermes Agent (NousResearch/hermes-agent) — the orchestrator.
# `version` pins the uvx --from spec so the build is reproducible.
# [[agents]]
# id = "hermes-main"
# role = "orchestrator"
# kind = "hermes"
# version = "0.14.0"
# cwd = "~/work/project"
# permission_policy = "auto-allow"  # or "deny"

# OpenClaw formatter #1 — routes through the OpenClaw Gateway.
# Prefer token_file over inline token so the secret stays out of the config.
# [[agents]]
# id = "openclaw-formatter-1"
# role = "formatter"
# kind = "openclaw"
# token_file = "~/.openclaw/main.token"
# session = "agent:formatter:main"

# OpenClaw formatter #2 — second seat on the same gateway session pool.
# [[agents]]
# id = "openclaw-formatter-2"
# role = "formatter"
# kind = "openclaw"
# token_file = "~/.openclaw/main.token"
# session = "agent:formatter:secondary"
